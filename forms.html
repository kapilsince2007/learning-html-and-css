<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
    <style>
        body{
            background-color: #414141;
            color: white;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">forms in html</h1>
<form action="url" method="get">
    <label for="fname">First Name:</label>
    <input type="text" placeholder="Eg. Ram" id="fname"><br>
    <label for="lname">Last Name:</label>
    <input type="text" placeholder="Eg. Thapa" id="lname"><br>
    <label for="email">Email:</label>
    <input type="email" placeholder="Eg. ram.thapa@example.com" id="email"><br>
</form>

</body>
</html>
